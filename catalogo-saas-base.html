<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --primario:#B91C2C;
    --secundario:#B8860B;
    --bg:#FAF8F4;
    --card:#FFFFFF;
    --texto:#23201D;
    --suave:#8C8579;
    --linea:#EDE7DC;
    --sombra:0 1px 3px rgba(40,30,20,.06),0 6px 24px rgba(40,30,20,.05);
    --sombra-hover:0 4px 12px rgba(40,30,20,.10),0 14px 40px rgba(40,30,20,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--texto);-webkit-font-smoothing:antialiased;overflow-x:hidden}

  /* SPLASH */
  #splash{position:fixed;inset:0;z-index:9999;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .7s ease,visibility .7s ease}
  #splash.gone{opacity:0;visibility:hidden;pointer-events:none}
  .sp-wrap{display:flex;flex-direction:column;align-items:center;animation:spIn .9s cubic-bezier(.22,1,.36,1) both}
  @keyframes spIn{from{opacity:0;transform:scale(.84) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .sp-logo{max-width:260px;max-height:120px;width:auto;height:auto;display:block}
  .sp-mark{width:96px;height:96px;border-radius:26px;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,var(--primario),var(--secundario));color:#fff;font-size:40px;font-weight:700;letter-spacing:1px;box-shadow:0 10px 30px rgba(40,30,20,.18)}
  .sp-nombre{margin-top:18px;font-size:22px;font-weight:700;color:var(--texto);text-align:center;animation:spIn .7s ease .25s both}
  .sp-tagline{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--suave);margin-top:6px;animation:spIn .7s ease .4s both}
  .sp-bar-wrap{width:100px;height:3px;background:var(--linea);border-radius:3px;overflow:hidden;margin-top:26px;animation:spIn .5s ease .35s both}
  .sp-bar{height:100%;width:0;background:linear-gradient(90deg,var(--primario),var(--secundario));border-radius:3px;animation:spLoad 1.9s ease forwards .4s}
  @keyframes spLoad{to{width:100%}}

  /* HERO */
  .hero{position:relative;overflow:hidden;text-align:center;color:#fff;background:linear-gradient(135deg,var(--primario),var(--secundario));padding:30px 18px 26px}
  .hero::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 75% -10%,rgba(255,255,255,.18),transparent 55%);pointer-events:none}
  .hero-logo{max-height:60px;width:auto;margin:0 auto 12px;display:block;position:relative;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.18))}
  .hero h1{font-size:24px;font-weight:700;letter-spacing:.3px;position:relative;z-index:1}
  .hero .sub{font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;opacity:.9;margin-top:6px;position:relative;z-index:1}

  /* BARRA STICKY */
  .barra{position:sticky;top:0;z-index:20;background:rgba(250,248,244,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--linea)}
  .cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  @media(min-width:1024px){.cats{justify-content:center;flex-wrap:wrap;overflow-x:visible;max-width:1180px;margin:0 auto}}
  .chip{flex:0 0 auto;border:1px solid var(--linea);background:var(--card);color:var(--suave);font-size:13px;font-weight:500;padding:8px 17px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all .18s}
  .chip:hover{border-color:var(--primario);color:var(--primario)}
  .chip.on{background:var(--primario);color:#fff;border-color:var(--primario);box-shadow:0 3px 10px rgba(0,0,0,.10)}
  #barra-busqueda{display:none;padding:0 16px 12px;max-width:680px;margin:0 auto;width:100%}
  .busq-wrap{position:relative}
  .busq-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--suave)}
  #busqueda{width:100%;padding:12px 14px 12px 42px;border:1px solid var(--linea);border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:var(--card);transition:border-color .18s,box-shadow .18s}
  #busqueda:focus{border-color:var(--primario);box-shadow:0 0 0 3px color-mix(in srgb,var(--primario) 14%,transparent)}

  /* GRILLA */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:18px 16px;max-width:540px;margin:0 auto}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);gap:18px;max-width:860px;padding:22px}}
  @media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr);gap:20px;max-width:1180px;padding:26px}}
  .card{background:var(--card);border:1px solid var(--linea);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sombra);transition:transform .22s ease,box-shadow .22s ease;opacity:0;transform:translateY(14px);animation:cardIn .5s ease forwards}
  @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
  .card:hover{transform:translateY(-4px);box-shadow:var(--sombra-hover)}
  .card .img{aspect-ratio:1/1;background:linear-gradient(160deg,#F4EDE1,#E9DECB);display:flex;align-items:center;justify-content:center;color:#C9B89A;overflow:hidden;position:relative}
  .card .img img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
  .card:hover .img img{transform:scale(1.05)}
  .card .img .ph{width:38px;height:38px;opacity:.5}
  .card .body{padding:12px 13px 13px;display:flex;flex-direction:column;flex:1}
  .card .nom{font-size:14px;font-weight:600;line-height:1.32;color:var(--texto)}
  .card .des{font-size:11.5px;color:var(--suave);margin:4px 0 10px;flex:1;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .precio{font-size:16px;font-weight:700;color:var(--primario);margin-bottom:10px;letter-spacing:.2px}
  .card .btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--primario);color:#fff;font-size:12.5px;font-weight:600;font-family:inherit;padding:10px;border-radius:11px;text-align:center;text-decoration:none;border:none;cursor:pointer;transition:filter .18s,transform .1s}
  .card .btn:hover{filter:brightness(1.08)}
  .card .btn:active{transform:scale(.97)}
  .card .btn svg{width:15px;height:15px}

  /* ESTADOS */
  .estado{text-align:center;padding:64px 20px;color:var(--suave);font-size:14px}
  .cat-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px}
  .cat-loader .spin{width:38px;height:38px;border:3px solid var(--linea);border-top-color:var(--primario);border-radius:50%;animation:gira .8s linear infinite}
  @keyframes gira{to{transform:rotate(360deg)}}
  .cat-loader span{font-size:13px;color:var(--suave);letter-spacing:.04em}

  /* PIE */
  footer{text-align:center;padding:28px 16px 36px;color:var(--suave);font-size:11px;letter-spacing:.05em;border-top:1px solid var(--linea);margin-top:10px}
  footer b{color:var(--texto);font-weight:600}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-wrap">
    <div id="sp-visual"><div class="sp-mark" id="sp-mark">&middot;</div></div>
    <div class="sp-nombre" id="sp-nombre">Cargando&hellip;</div>
    <div class="sp-tagline" id="sp-tagline"></div>
    <div class="sp-bar-wrap"><div class="sp-bar"></div></div>
  </div>
</div>

<header class="hero" id="cab">
  <h1 id="nom-empresa">Cargando&hellip;</h1>
  <div class="sub" id="sub-empresa"></div>
</header>

<div class="barra">
  <div class="cats" id="cats"></div>
  <div id="barra-busqueda">
    <div class="busq-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="busqueda" oninput="pintarProductos()" placeholder="Buscar producto&hellip;">
    </div>
  </div>
</div>

<div id="contenido">
  <div class="cat-loader"><div class="spin"></div><span>Cargando cat&aacute;logo&hellip;</span></div>
</div>

<footer id="pie" style="display:none">
  Cat&aacute;logo digital por <b>Fenlora Visual Studio</b>
</footer>

<script>
const SUPABASE_URL = 'https://pzxjvtbkrlpdtfyimhmi.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6eGp2dGJrcmxwZHRmeWltaG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Mzk1NzIsImV4cCI6MjA5NjQxNTU3Mn0.3rgBhcPPdXiPv9FOQWzoOK-d6NsIwUdttgm1HTYy1DA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function detectarSubdominio(){
  const params = new URLSearchParams(location.search);
  if (params.get('empresa')) return params.get('empresa');
  const partes = location.hostname.split('.');
  if (partes.length > 2) return partes[0];
  return 'samjuro';
}

let EMPRESA = null, PRODUCTOS = [], CATEGORIAS = [], categoriaActiva = 'todas';

function iniciales(nombre){
  const p = (nombre||'').trim().split(/\s+/).filter(Boolean);
  if (!p.length) return '·';
  if (p.length === 1) return p[0].slice(0,2).toUpperCase();
  return (p[0][0] + p[1][0]).toUpperCase();
}
function tagNicho(emp){
  if (emp.tipo_negocio === 'servicio') return 'Servicios';
  const n = emp.tipo_nicho || '';
  if (n.indexOf('belleza') >= 0 || n === 'cosmeticos') return 'Catálogo de Belleza';
  if (n === 'distribuidora' || n === 'mayorista') return 'Distribuidora';
  return 'Catálogo';
}

async function cargar(){
  const sub = detectarSubdominio();
  const { data: emp, error: e1 } = await sb
    .from('empresas').select('*')
    .eq('subdominio', sub).eq('activo', true).single();

  if (e1 || !emp){
    cerrarSplash();
    document.getElementById('contenido').innerHTML =
      '<div class="estado">No se encontró el catálogo de "'+esc(sub)+'".</div>';
    document.getElementById('nom-empresa').textContent = 'Catálogo no encontrado';
    return;
  }
  EMPRESA = emp;
  aplicarIdentidad(emp);

  const [{ data: cats }, { data: prods }] = await Promise.all([
    sb.from('categorias').select('*').eq('empresa_id', emp.id).eq('activo', true).order('orden'),
    sb.from('productos').select('*').eq('empresa_id', emp.id).eq('activo', true).order('orden')
  ]);
  CATEGORIAS = cats || [];
  PRODUCTOS = prods || [];

  pintarCategorias();
  pintarProductos();
  document.getElementById('pie').style.display = 'block';
  cerrarSplash();
}

function cerrarSplash(){
  setTimeout(function(){ document.getElementById('splash').classList.add('gone'); }, 600);
}

function aplicarIdentidad(emp){
  const r = document.documentElement.style;
  if (emp.color_primario)   r.setProperty('--primario', emp.color_primario);
  if (emp.color_secundario) r.setProperty('--secundario', emp.color_secundario);

  const tag = tagNicho(emp);
  document.getElementById('nom-empresa').textContent = emp.nombre;
  document.getElementById('sub-empresa').textContent = tag;
  document.title = emp.nombre;
  document.getElementById('sp-nombre').textContent = emp.nombre;
  document.getElementById('sp-tagline').textContent = tag;

  const mostrarLogo = emp.logo_url && emp.mostrar_logo !== false;

  if (mostrarLogo){
    document.getElementById('sp-visual').innerHTML =
      '<img class="sp-logo" src="'+esc(emp.logo_url)+'" alt="'+esc(emp.nombre)+'">';
  } else {
    document.getElementById('sp-mark').textContent = iniciales(emp.nombre);
  }

  if (mostrarLogo){
    const cab = document.getElementById('cab');
    const img = document.createElement('img');
    img.className = 'hero-logo'; img.src = emp.logo_url; img.alt = emp.nombre;
    cab.insertBefore(img, cab.firstChild);
  }

  if (emp.mostrar_busqueda !== false){
    document.getElementById('barra-busqueda').style.display = 'block';
  }
}

function pintarCategorias(){
  const cont = document.getElementById('cats');
  let html = '<div class="chip on" onclick="filtrar(this,\'todas\')">Todas</div>';
  CATEGORIAS.forEach(function(c){
    html += '<div class="chip" onclick="filtrar(this,\''+c.id+'\')">'+esc(c.nombre)+'</div>';
  });
  cont.innerHTML = html;
}
function filtrar(el, catId){
  categoriaActiva = catId;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  pintarProductos();
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function pintarProductos(){
  const cont = document.getElementById('contenido');
  let lista = PRODUCTOS;
  if (categoriaActiva !== 'todas'){
    lista = PRODUCTOS.filter(function(p){ return p.categoria_id === categoriaActiva; });
  }
  const inputBusq = document.getElementById('busqueda');
  const termino = inputBusq ? inputBusq.value.trim().toLowerCase() : '';
  if (termino){
    lista = lista.filter(function(p){
      return (p.nombre||'').toLowerCase().indexOf(termino) >= 0 ||
             (p.descripcion||'').toLowerCase().indexOf(termino) >= 0;
    });
  }
  if (!lista.length){
    cont.innerHTML = '<div class="estado">'
      + (termino ? 'No se encontró "'+esc(termino)+'".' : 'No hay productos en esta categoría todavía.')
      + '</div>';
    return;
  }

  const muestraPrecio = EMPRESA.muestra_precio;
  const textoBoton = EMPRESA.texto_boton || 'Pedir';
  const wa = (EMPRESA.whatsapp || '').replace(/\D/g,'');
  const waIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 00-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 01-1.9-1.2 7.2 7.2 0 01-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.5.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 00-.7.3 2.8 2.8 0 00-.9 2.1c0 1.2.9 2.4 1 2.6.1.2 1.8 2.8 4.4 3.9.6.3 1.1.4 1.5.5.6.2 1.2.2 1.6.1.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1l-.4-.2z"/></svg>';

  let html = '<div class="grid">';
  lista.forEach(function(p,i){
    const img = p.imagen_principal
      ? '<img src="'+esc(p.imagen_principal)+'" alt="'+esc(p.nombre)+'" loading="lazy">'
      : '<svg class="ph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>';
    const precio = (muestraPrecio && p.precio != null)
      ? '<div class="precio">$'+Number(p.precio).toLocaleString('es-CO')+'</div>'
      : '';
    const msg = encodeURIComponent('Hola, me interesa: '+p.nombre);
    const link = wa ? 'https://wa.me/'+wa+'?text='+msg : '#';
    const delay = Math.min(i,12)*0.05;
    html += '<div class="card" style="animation-delay:'+delay+'s">'
      + '<div class="img">'+img+'</div>'
      + '<div class="body">'
      + '<div class="nom">'+esc(p.nombre)+'</div>'
      + '<div class="des">'+esc(p.descripcion||'')+'</div>'
      + precio
      + '<a class="btn" href="'+link+'" target="_blank" rel="noopener">'+waIcon+esc(textoBoton)+'</a>'
      + '</div></div>';
  });
  html += '</div>';
  cont.innerHTML = html;
}

cargar();
</script>
</body>
</html>
