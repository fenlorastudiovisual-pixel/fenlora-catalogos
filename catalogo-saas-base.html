<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --primario:#B91C2C;
    --secundario:#B8860B;
    --bg:#FAF7F2;
    --card:#FFFFFF;
    --texto:#2A2A2A;
    --suave:#888;
    --linea:#ECE6DC;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--texto);-webkit-font-smoothing:antialiased}

  /* Cabecera con identidad de la empresa */
  header{background:var(--primario);color:#fff;padding:20px 16px;text-align:center;position:sticky;top:0;z-index:10}
  header .logo{max-height:54px;width:auto;margin:0 auto 8px;display:block}
  header h1{font-size:20px;font-weight:600;letter-spacing:.3px}
  header .sub{font-size:12px;opacity:.85;margin-top:3px}

  /* Barra de categorías deslizable */
  .cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--linea);position:sticky;top:0;z-index:9}
  .cats::-webkit-scrollbar{display:none}
  @media(min-width:1024px){
    .cats{justify-content:center;flex-wrap:wrap;overflow-x:visible;max-width:1180px;margin:0 auto}
  }
  .chip{flex:0 0 auto;border:1px solid var(--linea);background:#fff;color:var(--suave);font-size:13px;padding:7px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .chip.on{background:var(--primario);color:#fff;border-color:var(--primario)}

  /* Grilla de productos — responsive 2/3/4 columnas */
  /* Móvil (hasta 599px): 2 columnas */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px;max-width:520px;margin:0 auto}
  /* Tablet (600–1023px): 3 columnas, centrado */
  @media(min-width:600px){
    .grid{grid-template-columns:repeat(3,1fr);gap:16px;max-width:820px;padding:20px}
  }
  /* PC (1024px+): 4 columnas con ancho máximo */
  @media(min-width:1024px){
    .grid{grid-template-columns:repeat(4,1fr);gap:18px;max-width:1180px;padding:24px}
  }
  .card{background:var(--card);border:1px solid var(--linea);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .card .img{aspect-ratio:1/1;background:#F1E9DC;display:flex;align-items:center;justify-content:center;color:#C9B89A;font-size:32px;overflow:hidden}
  .card .img img{width:100%;height:100%;object-fit:cover}
  .card .body{padding:10px 12px;display:flex;flex-direction:column;flex:1}
  .card .nom{font-size:14px;font-weight:600;line-height:1.3}
  .card .des{font-size:11px;color:var(--suave);margin:3px 0 8px;flex:1}
  .card .precio{font-size:15px;font-weight:600;color:var(--primario);margin-bottom:8px}
  .card .btn{background:var(--primario);color:#fff;font-size:12px;font-weight:500;padding:8px;border-radius:9px;text-align:center;text-decoration:none;border:none;cursor:pointer}

  .estado{text-align:center;padding:60px 20px;color:var(--suave);font-size:14px}
  .spin{width:34px;height:34px;border:3px solid var(--linea);border-top-color:var(--primario);border-radius:50%;animation:gira .8s linear infinite;margin:0 auto 14px}
  @keyframes gira{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header id="cab">
  <h1 id="nom-empresa">Cargando…</h1>
  <div class="sub" id="sub-empresa"></div>
</header>

<div class="cats" id="cats"></div>

<div id="contenido">
  <div class="estado"><div class="spin"></div>Cargando catálogo…</div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONEXIÓN AL SAAS (Supabase de Fenlora)
// ══════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://pzxjvtbkrlpdtfyimhmi.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6eGp2dGJrcmxwZHRmeWltaG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Mzk1NzIsImV4cCI6MjA5NjQxNTU3Mn0.3rgBhcPPdXiPv9FOQWzoOK-d6NsIwUdttgm1HTYy1DA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ══════════════════════════════════════════════════════════════════
// DETECTAR LA EMPRESA
// Por ahora: por parámetro ?empresa=samjuro (para poder probar ya).
// Más adelante (Etapa 6): se detectará por el subdominio.
// ══════════════════════════════════════════════════════════════════
function detectarSubdominio(){
  const params = new URLSearchParams(location.search);
  if (params.get('empresa')) return params.get('empresa');
  // fallback: primer trozo del host (samjuro.fenloravisual.com → samjuro)
  const host = location.hostname;
  const partes = host.split('.');
  if (partes.length > 2) return partes[0];
  return 'samjuro'; // valor por defecto para pruebas locales
}

let EMPRESA = null;
let PRODUCTOS = [];
let CATEGORIAS = [];
let categoriaActiva = 'todas';

// ══════════════════════════════════════════════════════════════════
// CARGA INICIAL
// ══════════════════════════════════════════════════════════════════
async function cargar(){
  const sub = detectarSubdominio();

  // 1) Buscar la empresa por su subdominio
  const { data: emp, error: e1 } = await sb
    .from('empresas')
    .select('*')
    .eq('subdominio', sub)
    .eq('activo', true)
    .single();

  if (e1 || !emp){
    document.getElementById('contenido').innerHTML =
      '<div class="estado">No se encontró el catálogo de "'+sub+'".</div>';
    document.getElementById('nom-empresa').textContent = 'Catálogo no encontrado';
    return;
  }
  EMPRESA = emp;
  aplicarIdentidad(emp);

  // 2) Cargar categorías de esa empresa
  const { data: cats } = await sb
    .from('categorias')
    .select('*')
    .eq('empresa_id', emp.id)
    .eq('activo', true)
    .order('orden');
  CATEGORIAS = cats || [];

  // 3) Cargar productos de esa empresa
  const { data: prods } = await sb
    .from('productos')
    .select('*')
    .eq('empresa_id', emp.id)
    .eq('activo', true)
    .order('orden');
  PRODUCTOS = prods || [];

  pintarCategorias();
  pintarProductos();
}

// ══════════════════════════════════════════════════════════════════
// APLICAR IDENTIDAD (colores, logo, nombre, según la empresa)
// ══════════════════════════════════════════════════════════════════
function aplicarIdentidad(emp){
  const r = document.documentElement.style;
  if (emp.color_primario)   r.setProperty('--primario', emp.color_primario);
  if (emp.color_secundario) r.setProperty('--secundario', emp.color_secundario);

  document.getElementById('nom-empresa').textContent = emp.nombre;
  document.getElementById('sub-empresa').textContent =
    emp.tipo_negocio === 'servicio' ? 'Servicios' : 'Catálogo';
  document.title = emp.nombre;

  if (emp.logo_url){
    const cab = document.getElementById('cab');
    const img = document.createElement('img');
    img.className = 'logo'; img.src = emp.logo_url; img.alt = emp.nombre;
    cab.insertBefore(img, cab.firstChild);
  }
}

// ══════════════════════════════════════════════════════════════════
// CATEGORÍAS
// ══════════════════════════════════════════════════════════════════
function pintarCategorias(){
  const cont = document.getElementById('cats');
  let html = '<div class="chip on" data-cat="todas" onclick="filtrar(this,\'todas\')">Todas</div>';
  CATEGORIAS.forEach(c=>{
    html += '<div class="chip" data-cat="'+c.id+'" onclick="filtrar(this,\''+c.id+'\')">'+c.nombre+'</div>';
  });
  cont.innerHTML = html;
}
function filtrar(el, catId){
  categoriaActiva = catId;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  pintarProductos();
}

// ══════════════════════════════════════════════════════════════════
// PRODUCTOS
// ══════════════════════════════════════════════════════════════════
function pintarProductos(){
  const cont = document.getElementById('contenido');
  let lista = PRODUCTOS;
  if (categoriaActiva !== 'todas'){
    lista = PRODUCTOS.filter(p=>p.categoria_id === categoriaActiva);
  }
  if (!lista.length){
    cont.innerHTML = '<div class="estado">No hay productos en esta categoría todavía.</div>';
    return;
  }

  const muestraPrecio = EMPRESA.muestra_precio;
  const textoBoton = EMPRESA.texto_boton || 'Pedir';
  const wa = (EMPRESA.whatsapp || '').replace(/\D/g,'');

  let html = '<div class="grid">';
  lista.forEach(p=>{
    const img = p.imagen_principal
      ? '<img src="'+p.imagen_principal+'" alt="'+p.nombre+'">'
      : '◆';
    const precio = (muestraPrecio && p.precio != null)
      ? '<div class="precio">$'+Number(p.precio).toLocaleString('es-CO')+'</div>'
      : '';
    const msg = encodeURIComponent('Hola, me interesa: '+p.nombre);
    const link = wa ? 'https://wa.me/'+wa+'?text='+msg : '#';
    html += '<div class="card">'
      + '<div class="img">'+img+'</div>'
      + '<div class="body">'
      + '<div class="nom">'+p.nombre+'</div>'
      + '<div class="des">'+(p.descripcion||'')+'</div>'
      + precio
      + '<a class="btn" href="'+link+'" target="_blank" rel="noopener">'+textoBoton+'</a>'
      + '</div></div>';
  });
  html += '</div>';
  cont.innerHTML = html;
}

// Arrancar
cargar();
</script>
</body>
</html>
