<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --primario:#B91C2C;
    --secundario:#B8860B;
    --bg:#FBF9F5;
    --card:#FFFFFF;
    --texto:#1F1B17;
    --suave:#8A8377;
    --linea:#ECE5D9;
    --sombra:0 1px 3px rgba(35,25,15,.05),0 8px 30px rgba(35,25,15,.06);
    --sombra-hover:0 6px 16px rgba(35,25,15,.10),0 20px 50px rgba(35,25,15,.12);
    --serif:'Playfair Display',Georgia,serif;
    --sans:'DM Sans',system-ui,-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--bg);color:var(--texto);-webkit-font-smoothing:antialiased;overflow-x:hidden}

  /* ════ SPLASH ════ */
  #splash{position:fixed;inset:0;z-index:9999;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .7s ease,visibility .7s ease}
  #splash.gone{opacity:0;visibility:hidden;pointer-events:none}
  .sp-wrap{display:flex;flex-direction:column;align-items:center;animation:spIn 1s cubic-bezier(.22,1,.36,1) both}
  @keyframes spIn{from{opacity:0;transform:scale(.85) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .sp-logo{max-width:260px;max-height:120px;width:auto;height:auto;display:block}
  .sp-mark{width:102px;height:102px;border-radius:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,var(--primario),var(--secundario));color:#fff;font-family:var(--serif);font-size:42px;font-weight:700;box-shadow:0 12px 34px rgba(35,25,15,.20)}
  .sp-nombre{margin-top:20px;font-family:var(--serif);font-size:26px;font-weight:700;color:var(--texto);text-align:center;animation:spIn .8s ease .25s both;padding:0 24px}
  .sp-tagline{font-size:10.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--suave);margin-top:7px;animation:spIn .8s ease .4s both}
  .sp-bar-wrap{width:110px;height:3px;background:var(--linea);border-radius:3px;overflow:hidden;margin-top:28px;animation:spIn .6s ease .35s both}
  .sp-bar{height:100%;width:0;background:linear-gradient(90deg,var(--primario),var(--secundario));border-radius:3px;animation:spLoad 2s ease forwards .4s}
  @keyframes spLoad{to{width:100%}}

  /* ════ HERO ════ */
  .hero{position:relative;overflow:hidden;text-align:center;color:#fff;background:linear-gradient(135deg,var(--primario),var(--secundario));padding:46px 20px 42px}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 78% -20%,rgba(255,255,255,.22),transparent 55%),radial-gradient(circle at 15% 120%,rgba(0,0,0,.18),transparent 50%);pointer-events:none}
  .hero-inner{position:relative;z-index:1;animation:heroIn .9s cubic-bezier(.22,1,.36,1) both}
  @keyframes heroIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .hero-logo{max-height:64px;width:auto;margin:0 auto 16px;display:block;filter:drop-shadow(0 3px 8px rgba(0,0,0,.22))}
  .hero-pill{display:inline-block;font-size:10.5px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;padding:6px 16px;border:1px solid rgba(255,255,255,.4);border-radius:999px;backdrop-filter:blur(4px);background:rgba(255,255,255,.10);margin-bottom:16px}
  .hero h1{font-family:var(--serif);font-size:34px;font-weight:700;line-height:1.1;letter-spacing:.2px;text-shadow:0 2px 12px rgba(0,0,0,.15)}
  .hero .deco{width:46px;height:2px;background:rgba(255,255,255,.6);margin:16px auto 0;border-radius:2px}
  @media(min-width:700px){.hero{padding:60px 20px 54px}.hero h1{font-size:46px}}

  /* ════ BARRA STICKY ════ */
  .barra{position:sticky;top:0;z-index:30;background:rgba(251,249,245,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--linea)}
  .cats{display:flex;gap:8px;padding:13px 16px;overflow-x:auto;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  @media(min-width:1024px){.cats{justify-content:center;flex-wrap:wrap;overflow-x:visible;max-width:1180px;margin:0 auto}}
  .chip{flex:0 0 auto;border:1px solid var(--linea);background:var(--card);color:var(--suave);font-size:13px;font-weight:600;padding:8px 18px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all .2s}
  .chip:hover{border-color:var(--primario);color:var(--primario)}
  .chip.on{background:var(--primario);color:#fff;border-color:var(--primario);box-shadow:0 4px 12px rgba(0,0,0,.12)}
  #barra-busqueda{display:none;padding:0 16px 13px;max-width:680px;margin:0 auto;width:100%}
  .busq-wrap{position:relative}
  .busq-wrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--suave)}
  #busqueda{width:100%;padding:13px 14px 13px 44px;border:1px solid var(--linea);border-radius:13px;font-size:14px;font-family:inherit;outline:none;background:var(--card);transition:border-color .18s,box-shadow .18s}
  #busqueda:focus{border-color:var(--primario);box-shadow:0 0 0 3px color-mix(in srgb,var(--primario) 14%,transparent)}

  /* ════ GRILLA ════ */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:22px 16px;max-width:560px;margin:0 auto}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;padding:26px}}
  @media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr);gap:22px;max-width:1200px;padding:30px}}
  .card{background:var(--card);border:1px solid var(--linea);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sombra);transition:transform .25s ease,box-shadow .25s ease;opacity:0;transform:translateY(16px);animation:cardIn .55s ease forwards}
  @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
  .card:hover{transform:translateY(-5px);box-shadow:var(--sombra-hover)}
  .card .img{aspect-ratio:1/1;background:linear-gradient(160deg,#F5EEE2,#E9DECB);display:flex;align-items:center;justify-content:center;color:#C9B89A;overflow:hidden;position:relative}
  .card .img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
  .card:hover .img img{transform:scale(1.06)}
  .card .img .ph{width:40px;height:40px;opacity:.5}
  .card .badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,.92);color:var(--primario);backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .card .body{padding:13px 14px 14px;display:flex;flex-direction:column;flex:1}
  .card .nom{font-family:var(--serif);font-size:15.5px;font-weight:600;line-height:1.25;color:var(--texto)}
  .card .des{font-size:11.5px;color:var(--suave);margin:5px 0 11px;flex:1;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .precio{font-size:17px;font-weight:700;color:var(--primario);margin-bottom:11px;letter-spacing:.2px}
  .card .btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--primario);color:#fff;font-size:12.5px;font-weight:600;font-family:inherit;padding:11px;border-radius:12px;text-align:center;text-decoration:none;border:none;cursor:pointer;transition:filter .18s,transform .1s}
  .card .btn:hover{filter:brightness(1.09)}
  .card .btn:active{transform:scale(.97)}
  .card .btn svg{width:15px;height:15px}

  /* ════ FAB WHATSAPP ════ */
  .wa-fab{position:fixed;right:18px;bottom:18px;z-index:50;display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;text-decoration:none;padding:13px 18px 13px 15px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:0 6px 22px rgba(37,211,102,.45);animation:wap 2.6s ease-in-out infinite;transition:transform .15s}
  .wa-fab:active{transform:scale(.94)}
  .wa-fab svg{width:24px;height:24px;flex-shrink:0}
  .wa-fab .txt{white-space:nowrap}
  @media(max-width:520px){.wa-fab .txt{display:none}.wa-fab{padding:14px;border-radius:50%}}
  @keyframes wap{0%,100%{box-shadow:0 6px 22px rgba(37,211,102,.42)}50%{box-shadow:0 6px 34px rgba(37,211,102,.72)}}

  /* ════ ESTADOS / PIE ════ */
  .estado{text-align:center;padding:66px 20px;color:var(--suave);font-size:14px}
  .cat-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 20px;gap:14px}
  .cat-loader .spin{width:40px;height:40px;border:3px solid var(--linea);border-top-color:var(--primario);border-radius:50%;animation:gira .8s linear infinite}
  @keyframes gira{to{transform:rotate(360deg)}}
  .cat-loader span{font-size:13px;color:var(--suave);letter-spacing:.04em}
  footer{text-align:center;padding:30px 16px 40px;color:var(--suave);font-size:11px;letter-spacing:.05em;border-top:1px solid var(--linea);margin-top:14px}
  footer b{color:var(--texto);font-weight:600}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-wrap">
    <div id="sp-visual"><div class="sp-mark" id="sp-mark">&middot;</div></div>
    <div class="sp-nombre" id="sp-nombre">Cargando&hellip;</div>
    <div class="sp-tagline" id="sp-tagline"></div>
    <div class="sp-bar-wrap"><div class="sp-bar"></div></div>
  </div>
</div>

<header class="hero" id="cab">
  <div class="hero-inner">
    <div class="hero-pill" id="hero-pill" style="display:none"></div>
    <h1 id="nom-empresa">Cargando&hellip;</h1>
    <div class="deco"></div>
  </div>
</header>

<div class="barra">
  <div class="cats" id="cats"></div>
  <div id="barra-busqueda">
    <div class="busq-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="busqueda" oninput="pintarProductos()" placeholder="Buscar&hellip;">
    </div>
  </div>
</div>

<div id="contenido">
  <div class="cat-loader"><div class="spin"></div><span>Cargando cat&aacute;logo&hellip;</span></div>
</div>

<a id="wa-fab" class="wa-fab" href="#" target="_blank" rel="noopener" style="display:none">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 00-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 01-1.9-1.2 7.2 7.2 0 01-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.5.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 00-.7.3 2.8 2.8 0 00-.9 2.1c0 1.2.9 2.4 1 2.6.1.2 1.8 2.8 4.4 3.9.6.3 1.1.4 1.5.5.6.2 1.2.2 1.6.1.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1l-.4-.2z"/></svg>
  <span class="txt">Escríbenos</span>
</a>

<footer id="pie" style="display:none">
  Cat&aacute;logo digital por <b>Fenlora Visual Studio</b>
</footer>

<script>
const SUPABASE_URL = 'https://pzxjvtbkrlpdtfyimhmi.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6eGp2dGJrcmxwZHRmeWltaG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Mzk1NzIsImV4cCI6MjA5NjQxNTU3Mn0.3rgBhcPPdXiPv9FOQWzoOK-d6NsIwUdttgm1HTYy1DA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function detectarSubdominio(){
  const params = new URLSearchParams(location.search);
  if (params.get('empresa')) return params.get('empresa');
  const partes = location.hostname.split('.');
  if (partes.length > 2) return partes[0];
  return 'samjuro';
}

let EMPRESA = null, PRODUCTOS = [], CATEGORIAS = [], categoriaActiva = 'todas';

function iniciales(nombre){
  const p = (nombre||'').trim().split(/\s+/).filter(Boolean);
  if (!p.length) return '·';
  if (p.length === 1) return p[0].slice(0,2).toUpperCase();
  return (p[0][0] + p[1][0]).toUpperCase();
}
function tagNicho(emp){
  if (emp.tipo_negocio === 'servicio') return 'Servicios';
  const n = emp.tipo_nicho || '';
  if (n.indexOf('belleza') >= 0 || n === 'cosmeticos') return 'Catálogo de Belleza';
  if (n === 'distribuidora' || n === 'mayorista') return 'Distribuidora';
  return 'Catálogo';
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function cargar(){
  const sub = detectarSubdominio();
  const { data: emp, error: e1 } = await sb
    .from('empresas').select('*')
    .eq('subdominio', sub).eq('activo', true).single();

  if (e1 || !emp){
    cerrarSplash();
    document.getElementById('contenido').innerHTML =
      '<div class="estado">No se encontró el catálogo de "'+esc(sub)+'".</div>';
    document.getElementById('nom-empresa').textContent = 'Catálogo no encontrado';
    return;
  }
  EMPRESA = emp;
  aplicarIdentidad(emp);

  const [{ data: cats }, { data: prods }] = await Promise.all([
    sb.from('categorias').select('*').eq('empresa_id', emp.id).eq('activo', true).order('orden'),
    sb.from('productos').select('*').eq('empresa_id', emp.id).eq('activo', true).order('orden')
  ]);
  CATEGORIAS = cats || [];
  PRODUCTOS = prods || [];

  pintarCategorias();
  pintarProductos();
  document.getElementById('pie').style.display = 'block';
  cerrarSplash();
}

function cerrarSplash(){
  setTimeout(function(){ document.getElementById('splash').classList.add('gone'); }, 700);
}

function aplicarIdentidad(emp){
  const r = document.documentElement.style;
  if (emp.color_primario)   r.setProperty('--primario', emp.color_primario);
  if (emp.color_secundario) r.setProperty('--secundario', emp.color_secundario);

  const tag = tagNicho(emp);
  document.getElementById('nom-empresa').textContent = emp.nombre;
  document.title = emp.nombre;
  document.getElementById('sp-nombre').textContent = emp.nombre;
  document.getElementById('sp-tagline').textContent = tag;

  const pill = document.getElementById('hero-pill');
  pill.textContent = tag;
  pill.style.display = 'inline-block';

  const mostrarLogo = emp.logo_url && emp.mostrar_logo !== false;
  if (mostrarLogo){
    document.getElementById('sp-visual').innerHTML =
      '<img class="sp-logo" src="'+esc(emp.logo_url)+'" alt="'+esc(emp.nombre)+'">';
    const cab = document.querySelector('.hero-inner');
    const img = document.createElement('img');
    img.className = 'hero-logo'; img.src = emp.logo_url; img.alt = emp.nombre;
    cab.insertBefore(img, cab.firstChild);
  } else {
    document.getElementById('sp-mark').textContent = iniciales(emp.nombre);
  }

  if (emp.mostrar_busqueda !== false){
    document.getElementById('barra-busqueda').style.display = 'block';
  }

  // Botón flotante de WhatsApp (para clientes y vendedores externos)
  const wa = (emp.whatsapp || '').replace(/\D/g,'');
  if (wa){
    const fab = document.getElementById('wa-fab');
    const msg = encodeURIComponent('Hola, vi el catálogo de '+emp.nombre+' y me gustaría más información.');
    fab.href = 'https://wa.me/'+wa+'?text='+msg;
    fab.style.display = 'flex';
  }
}

function pintarCategorias(){
  const cont = document.getElementById('cats');
  let html = '<div class="chip on" onclick="filtrar(this,\'todas\')">Todas</div>';
  CATEGORIAS.forEach(function(c){
    html += '<div class="chip" onclick="filtrar(this,\''+c.id+'\')">'+esc(c.nombre)+'</div>';
  });
  cont.innerHTML = html;
}
function filtrar(el, catId){
  categoriaActiva = catId;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  pintarProductos();
}

function nombreCat(id){
  const c = CATEGORIAS.find(function(x){ return x.id === id; });
  return c ? c.nombre : '';
}

function pintarProductos(){
  const cont = document.getElementById('contenido');
  let lista = PRODUCTOS;
  if (categoriaActiva !== 'todas'){
    lista = PRODUCTOS.filter(function(p){ return p.categoria_id === categoriaActiva; });
  }
  const inputBusq = document.getElementById('busqueda');
  const termino = inputBusq ? inputBusq.value.trim().toLowerCase() : '';
  if (termino){
    lista = lista.filter(function(p){
      return (p.nombre||'').toLowerCase().indexOf(termino) >= 0 ||
             (p.descripcion||'').toLowerCase().indexOf(termino) >= 0;
    });
  }
  if (!lista.length){
    cont.innerHTML = '<div class="estado">'
      + (termino ? 'No se encontró "'+esc(termino)+'".' : 'No hay productos en esta categoría todavía.')
      + '</div>';
    return;
  }

  const muestraPrecio = EMPRESA.muestra_precio;
  const textoBoton = EMPRESA.texto_boton || 'Pedir';
  const wa = (EMPRESA.whatsapp || '').replace(/\D/g,'');
  const verCat = (categoriaActiva === 'todas' && CATEGORIAS.length > 1);
  const waIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 00-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 01-1.9-1.2 7.2 7.2 0 01-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.5.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 00-.7.3 2.8 2.8 0 00-.9 2.1c0 1.2.9 2.4 1 2.6.1.2 1.8 2.8 4.4 3.9.6.3 1.1.4 1.5.5.6.2 1.2.2 1.6.1.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1l-.4-.2z"/></svg>';

  let html = '<div class="grid">';
  lista.forEach(function(p,i){
    const img = p.imagen_principal
      ? '<img src="'+esc(p.imagen_principal)+'" alt="'+esc(p.nombre)+'" loading="lazy">'
      : '<svg class="ph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>';
    const badge = verCat ? '<span class="badge">'+esc(nombreCat(p.categoria_id))+'</span>' : '';
    const precio = (muestraPrecio && p.precio != null)
      ? '<div class="precio">$'+Number(p.precio).toLocaleString('es-CO')+'</div>'
      : '';
    const msg = encodeURIComponent('Hola, me interesa: '+p.nombre);
    const link = wa ? 'https://wa.me/'+wa+'?text='+msg : '#';
    const delay = Math.min(i,12)*0.05;
    html += '<div class="card" style="animation-delay:'+delay+'s">'
      + '<div class="img">'+badge+img+'</div>'
      + '<div class="body">'
      + '<div class="nom">'+esc(p.nombre)+'</div>'
      + '<div class="des">'+esc(p.descripcion||'')+'</div>'
      + precio
      + '<a class="btn" href="'+link+'" target="_blank" rel="noopener">'+waIcon+esc(textoBoton)+'</a>'
      + '</div></div>';
  });
  html += '</div>';
  cont.innerHTML = html;
}

cargar();
</script>
</body>
</html>
